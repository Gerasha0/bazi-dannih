# ============================================================
# Конфігурація Spring Boot — Restaurant Network App
# ============================================================
spring.application.name=restaurant-app

# --- MySQL DataSource ---
spring.datasource.url=jdbc:mysql://localhost:3306/restaurant_network?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Europe/Kiev&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=restaurant_db
spring.datasource.password=restaurant123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# --- Logging ---
logging.level.com.restaurant=INFO
logging.level.org.springframework=WARN
